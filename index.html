<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Chess | Powered by Groq AI</title>

    <link rel="stylesheet"
      href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">

    <style>
        :root {
            --neon-green: #00ff41;
            --dark-bg: #0d0d0d;
            --panel-bg: #1a1a1a;
        }

        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            color: var(--neon-green);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin: 0;
        }

        #board {
            width: 400px;
            border: 4px solid #333;
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.1);
        }

        .status-container {
            margin-top: 20px;
            padding: 15px;
            background: var(--panel-bg);
            border: 1px solid #333;
            width: 380px;
            text-align: center;
        }

        #status {
            color: var(--neon-green);
            font-weight: bold;
        }

        .controls {
            margin-top: 20px;
        }

        .btn {
            background: transparent;
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            padding: 10px 20px;
            cursor: pointer;
            text-transform: uppercase;
            font-family: inherit;
            transition: 0.3s;
        }

        .btn:hover {
            background: var(--neon-green);
            color: black;
        }

        .error-log {
            color: #ff4444;
            font-size: 12px;
            margin-top: 10px;
            max-width: 400px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Neural Chess v1.0 write by Khong</h1>
        <p>You: White | AI: Black</p>
    </div>

    <div id="board"></div>

    <div class="status-container">
        <div>STATUS: <span id="status">Initializing...</span></div>
        <div id="error-display" class="error-log"></div>
    </div>

    <div class="controls">
        <button class="btn" onclick="resetGame()">Restart System</button>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>

    <script>
        // API Configuration
        const API_KEY = "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";
        const MODEL = "llama-3.3-70b-versatile";

        var board = null;
        var game = new Chess();
        var $status = $('#status');
        var $error = $('#error-display');

        function onDragStart (source, piece, position, orientation) {
            // Do not pick up pieces if the game is over
            if (game.game_over()) return false;

            // Only pick up pieces for White
            if (piece.search(/^b/) !== -1) return false;
        }

        async function makeAiMove() {
            $status.html("AI IS THINKING...");
            $error.html("");

            const fen = game.fen();


            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${API_KEY}`
                    },
                    body: JSON.stringify({
                        model: MODEL,
                        messages: [
                            {
                                role: "system",
                                content: "You are a professional chess player. Return ONLY the move for Black in UCI format (e.g. e7e5 or g8f6) based on the FEN provided. No explanation."
                            },
                            { role: "user", content: "FEN: " + fen }
                        ],
                        temperature: 0.2
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error ? data.error.message : "API Request Failed");
                }

                const moveText = data.choices[0].message.content.trim();
                console.log("AI suggested:", moveText);

                // Attempt to make the move
                const move = game.move(moveText, { sloppy: true });

                if (move === null) {
                    console.warn("AI sent invalid move. Forcing random move.");
                    const legalMoves = game.moves();
                    game.move(legalMoves[Math.floor(Math.random() * legalMoves.length)]);
                }

                board.position(game.fen());
                updateStatus();

            } catch (err) {
                $status.html("SYSTEM ERROR");
                $error.html("Details: " + err.message);
                console.error(err);
            }
        }

        function onDrop (source, target) {
            // see if the move is legal
            var move = game.move({
                from: source,
                to: target,
                promotion: 'q' // NOTE: always promote to a queen for example simplicity
            });

            // illegal move
            if (move === null) return 'snapback';

            updateStatus();

            // Trigger AI move after user finishes animation
            window.setTimeout(makeAiMove, 500);
        }

        // Update the board position after the piece snap
        // for castling, en passant, pawn promotion
        function onSnapEnd () {
            board.position(game.fen());
        }

        function updateStatus() {
            var status = '';

            var moveColor = 'White';
            if (game.turn() === 'b') {
                moveColor = 'Black';
            }

            if (game.in_checkmate()) {
                status = 'GAME OVER - ' + moveColor + ' is in checkmate.';
            } else if (game.in_draw()) {
                status = 'GAME OVER - Draw';
            } else {
                status = moveColor + ' to move';
                if (game.in_check()) {
                    status += ' (CHECK)';
                }
            }

            $status.html(status.toUpperCase());
        }

        function resetGame() {
            game.reset();
            board.start();
            updateStatus();
            $error.html("");
        }

        var config = {
            draggable: true,
            position: 'start',
            onDragStart: onDragStart,
            onDrop: onDrop,
            onSnapEnd: onSnapEnd,
            pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
        };
        board = ChessBoard('board', config);

        updateStatus();
    </script>
</body>
</html>
